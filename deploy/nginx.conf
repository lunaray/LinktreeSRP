server {
    server_name www.tasteofsilver.com tasteofsilver.com;

    # Serve the built React app
    root /root/LinktreeSRP/dist;
    index index.html;

    # SPA fallback — all unknown routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy PocketBase REST API
    location /api/ {
        proxy_pass         http://127.0.0.1:8090/api/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 360s;
    }

    # Proxy PocketBase admin dashboard (/_/)
    location /_/ {
        proxy_pass         http://127.0.0.1:8090/_/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Block direct access to the PocketBase source and data
    location ~* /pb/ {
        deny all;
    }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/tasteofsilver.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/tasteofsilver.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


}

# Redirect www → apex (HTTPS — certbot will manage the SSL lines below)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.tasteofsilver.com;

    ssl_certificate /etc/letsencrypt/live/tasteofsilver.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tasteofsilver.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://tasteofsilver.com$request_uri;
}
server {
    if ($host = www.tasteofsilver.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = tasteofsilver.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name www.tasteofsilver.com tasteofsilver.com;
    return 404; # managed by Certbot